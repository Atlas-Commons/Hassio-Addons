---
name: Add-on CI/CD (Forgejo)

on:
  push:
    tags:
      - '*'
    branches:
      - "*"
  pull_request:
    branches:
      - "main"

jobs:
    build_main_or_pr:
      name: Build ${{ matrix.architecture }} (Main or PR)
      if: contains(github.server_url, 'git.atlastechsolutions.co.uk') && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request'))
      runs-on: docker
      strategy:
        fail-fast: false
        matrix:
          architecture: ["aarch64", "amd64", "armhf", "armv7", "i386"]
          folder: ["addons/adb_server"]
      outputs:
        version:  ${{ steps.set_version.outputs.version }}
        slug_lower: ${{ steps.convert.outputs.slug_lower }}
        repository_owner_lower: ${{ steps.convert.outputs.repository_owner_lower }}
        folder: ${{ matrix.folder }}
      steps:
        - name: Check out code from GitHub
          uses: https://github.com/actions/checkout@v3
          with:
            token: ${{ secrets.FORGEJO_TOKEN }}
        - name: Setup Docker
          run: |
            set -euo pipefail
            if ! command -v docker >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq docker.io
            fi
            if ! docker info >/dev/null 2>&1; then
              for host in dind.docker.internal dind; do
                GW="$(ip route show default 2>/dev/null | awk '/default/ {print $3; exit}')"
                if [[ -n "${GW:-}" ]] && ! grep -qE "[[:space:]]${host}$" /etc/hosts 2>/dev/null; then
                  echo "${GW} ${host}" >> /etc/hosts
                fi
              done
              echo "DOCKER_HOST=tcp://dind.docker.internal:2375" >> "$GITHUB_ENV"
              export DOCKER_HOST=tcp://dind.docker.internal:2375
            fi
            docker info
        - name: Install yq
          run: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq wget
            wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            chmod +x /usr/local/bin/yq
            yq --version
        - name: Load add-on metadata
          id: addon
          run: |
            FOLDER="${{ matrix.folder }}"
            if [[ -z "$FOLDER" || ! -f "${FOLDER}/version.txt" ]]; then
              echo "Invalid add-on folder: ${FOLDER:-<empty>}" >&2
              exit 1
            fi
            VERSION=$(cat "./${FOLDER}/version.txt")
            if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              VERSION="dev-${VERSION}"
            fi
            SLUG=$(python3 -c "import json; print(json.load(open('${FOLDER}/config.json')).get('slug',''))")
            NAME=$(python3 -c "import json; print(json.load(open('${FOLDER}/config.json')).get('name',''))")
            DESC=$(python3 -c "import json; print(json.load(open('${FOLDER}/config.json')).get('description',''))")
            {
              echo "version=${VERSION}"
              echo "slug=${SLUG}"
              echo "name=${NAME}"
              echo "description=${DESC}"
              echo "build=${FOLDER}/build.json"
            } >> "$GITHUB_OUTPUT"
        - name: Set version for branches
          id: set_version
          run: echo "version=${{ steps.addon.outputs.version }}" >> "$GITHUB_OUTPUT"

        - name: Debug - Print matrix folder path
          run: |
            echo "Matrix folder path: ${{ matrix.folder }}"
        - name: Set up build cache
          id: cache
          uses: actions/cache@v4
          with:
            path: /tmp/.docker-cache
            key: docker-${{ matrix.architecture }}-${{ github.sha }}
            restore-keys: |
              docker-${{ matrix.architecture }}
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3.0.0
        - name: Log in to DockerHub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Log in to GHCR (PAT)
          id: ghcr_pat
          uses: docker/login-action@v2
          continue-on-error: true
          with:
            registry: ghcr.io
            username: ${{ secrets.GHCR_USERNAME }}
            password: ${{ secrets.GHCR_TOKEN }}
        - name: Log in to GHCR (GITHUB_TOKEN)
          id: ghcr_token
          if: contains(github.server_url, 'github.com') && steps.ghcr_pat.outcome != 'success'
          uses: docker/login-action@v2
          continue-on-error: true
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Log in to Forgejo Container Registry
          id: forgejo_login
          uses: docker/login-action@v2
          continue-on-error: true
          with:
            registry: git.atlastechsolutions.co.uk
            username: ${{ secrets.FORGEJO_USERNAME }}
            password: ${{ secrets.FORGEJO_TOKEN }}
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3.3.0
        - name: Compose build flags
          id: flags
          run: |
            echo "date=$(date '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
            from=$(yq eval '.build_from["${{ matrix.architecture }}"]' "${{ steps.addon.outputs.build }}")
            from=$(echo $from | tr -d '"')
            echo "from=${from}" >> $GITHUB_OUTPUT
            echo "BUILD_VERSION=${{ steps.addon.outputs.version }}" >> $GITHUB_OUTPUT
            if [[ "${{ matrix.architecture }}" == "amd64" ]]; then
              echo "platform=linux/amd64" >> $GITHUB_OUTPUT
            elif [[ "${{ matrix.architecture }}" == "i386" ]]; then
              echo "platform=linux/386" >> $GITHUB_OUTPUT
            elif [[ "${{ matrix.architecture }}" == "armhf" ]]; then
              echo "platform=linux/arm/v6" >> $GITHUB_OUTPUT
            elif [[ "${{ matrix.architecture }}" == "armv7" ]]; then
              echo "platform=linux/arm/v7" >> $GITHUB_OUTPUT
            elif [[ "${{ matrix.architecture }}" == "aarch64" ]]; then
              echo "platform=linux/arm64/v8" >> $GITHUB_OUTPUT
            else
              echo "::error ::Could not determine platform for architecture ${{ matrix.architecture }}"
              exit 1
            fi
        - name: Debug - Print 'from' variable
          run: |
            echo "From variable: ${{ steps.flags.outputs.from }}"
        - name: Download base image
          if: steps.flags.outputs.from != 'null'
          run: |
            echo "Pulling base image: ${{ steps.flags.outputs.from }}"
            docker pull ${{ steps.flags.outputs.from }}
        - name: Convert to Lowercase
          id: convert
          run: |
            SLUG_LOWER=$(echo ${{ steps.addon.outputs.slug }} | tr '[:upper:]' '[:lower:]')
            REPOSITORY_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
            REPOSITORY_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
            echo "slug_lower=$SLUG_LOWER" >> $GITHUB_OUTPUT
            echo "repository_lower=$REPOSITORY_LOWER" >> $GITHUB_OUTPUT
            echo "repository_owner_lower=$REPOSITORY_OWNER_LOWER" >> $GITHUB_OUTPUT
        - name: Build and Push Docker image
          uses: docker/build-push-action@v2
          with:
            push: true
            context: ./${{ matrix.folder }}
            file: ./${{ matrix.folder }}/Dockerfile
            platforms: ${{ steps.flags.outputs.platform }}
            cache-from: type=local,src=/tmp/.docker-cache
            cache-to: type=local,mode=max,dest=/tmp/.docker-cache-new
            build-args: |
              BUILD_ARCH=${{ matrix.architecture }}
              BUILD_DATE=${{ steps.flags.outputs.date }}
              BUILD_DESCRIPTION=${{ steps.addon.outputs.description }}
              BUILD_FROM=${{ steps.flags.outputs.from }}
              BUILD_NAME=${{ steps.addon.outputs.name }}
              BUILD_REF=${{ github.sha }}
              BUILD_REPOSITORY=${{ steps.convert.outputs.repository_lower }}
              BUILD_VERSION=${{ steps.addon.outputs.version }}
            tags: |
                ${{ secrets.DOCKER_USERNAME }}/${{ steps.convert.outputs.slug_lower }}:${{ steps.set_version.outputs.version }}-${{ matrix.architecture }}
                ghcr.io/${{ steps.convert.outputs.repository_owner_lower }}/${{ steps.convert.outputs.slug_lower }}:${{ steps.set_version.outputs.version }}-${{ matrix.architecture }}
                git.atlastechsolutions.co.uk/${{ steps.convert.outputs.repository_owner_lower }}/${{ steps.convert.outputs.slug_lower }}:${{ steps.set_version.outputs.version }}-${{ matrix.architecture }}
        - name: Swap build cache
          run: |
            if [ -d /tmp/.docker-cache-new ]; then
              rm -rf /tmp/.docker-cache
              mv /tmp/.docker-cache-new /tmp/.docker-cache
            else
              echo "Cache directory /tmp/.docker-cache-new does not exist"
            fi
        - name: Link container package to repository
          if: steps.forgejo_login.outcome == 'success' && github.event_name == 'push'
          env:
            FORGEJO_USERNAME: ${{ secrets.FORGEJO_USERNAME }}
            FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          run: |
            bash .github/scripts/forgejo-packages.sh link \
              "${{ steps.convert.outputs.repository_owner_lower }}" \
              container \
              "${{ steps.convert.outputs.slug_lower }}" \
              "${{ github.event.repository.name }}"

    forgejo_validate:
      name: Validate add-ons (Forgejo)
      if: ${{ !contains(github.server_url, 'github.com') }}
      runs-on: ubuntu-latest
      steps:
        - uses: https://github.com/actions/checkout@v4
          with:
            token: ${{ secrets.FORGEJO_TOKEN }}
        - name: Validate all add-ons
          run: |
            set -euo pipefail
            shopt -s nullglob
            dirs=(addons/*/)
            if [ ${#dirs[@]} -eq 0 ]; then
              echo "No add-on directories found under addons/"
              exit 1
            fi
            for dir in "${dirs[@]}"; do
              dir="${dir%/}"
              echo "Validating ${dir}"
              test -f "${dir}/config.json"
              test -f "${dir}/build.json"
              test -f "${dir}/version.txt"
              python3 -m json.tool "${dir}/config.json" > /dev/null
              python3 -m json.tool "${dir}/build.json" > /dev/null
            done

    dco:
      name: DCO sign-off
      runs-on: ubuntu-latest
      if: contains(github.server_url, 'git.atlastechsolutions.co.uk') && github.event_name == 'pull_request'
      steps:
        - uses: https://github.com/actions/checkout@v4
          with:
            fetch-depth: 0
            token: ${{ secrets.FORGEJO_TOKEN }}
        - name: Verify DCO
          run: bash .github/scripts/verify-dco.sh

    required:
      name: Required checks
      if: >-
        always() &&
        contains(github.server_url, 'git.atlastechsolutions.co.uk') &&
        (
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        )
      runs-on: ubuntu-latest
      needs: [build_main_or_pr, forgejo_validate, dco]
      steps:
        - name: Verify all CI jobs succeeded
          run: |
            if [[ "${{ needs.forgejo_validate.result }}" != "success" ]]; then exit 1; fi
            if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ needs.build_main_or_pr.result }}" != "success" && "${{ needs.build_main_or_pr.result }}" != "skipped" ]]; then exit 1; fi
            if [[ "${{ github.event_name }}" == "pull_request" && "${{ needs.dco.result }}" != "success" ]]; then exit 1; fi
            echo "Forgejo required checks passed."
